services:
  db:
    image: postgres:15-alpine
    container_name: efd_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456789"
      POSTGRES_DB: efd_dev
    command: -p 5430
    ports:
      - "5434:5430"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-sql:/docker-entrypoint-initdb.d/
    networks:
      - efd_network

  api:
    build:
      context: ./API_EFD
    container_name: efd_api
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=123456789
      - DB_NAME=efd_dev
      - DB_PORT=5430
      - SECRET_KEY=123456789abcdef
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
    ports:
      - "8001:8001"
    networks:
      - efd_network

  app:
    build:
      context: ./APP_EFD
    container_name: efd_app
    restart: always
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_TURNSTILE_SITE_KEY=1x00000000000000000000AA
    ports:
      - "9091:80"
    networks:
      - efd_network

networks:
  efd_network:
    driver: bridge

volumes:
  postgres_data: