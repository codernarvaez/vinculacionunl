services:
  db:
    image: postgres:15-alpine
    container_name: efd_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456789"
      POSTGRES_DB: efd_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-sql:/docker-entrypoint-initdb.d/

  api:
    build:
      context: ./API_EFD
    container_name: efd_api
    restart: always
    depends_on:
      - db
    volumes:
      - ./API_EFD:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=123456789
      - DB_NAME=efd_dev
      - DB_PORT=5432
      - SECRET_KEY=123456789abcdef
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
    ports:
      - "8000:8000"

  app:
    build:
      context: ./APP_EFD
    container_name: efd_app
    restart: always
    depends_on:
      - api
    volumes:
      - ./APP_EFD:/app
      - /app/node_modules 
    command: npm run dev -- --host
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_TURNSTILE_SITE_KEY=1x00000000000000000000AA
    ports:
      - "5173:5173"

volumes:
  postgres_data: